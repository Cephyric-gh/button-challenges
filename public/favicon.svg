<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="face" x1="6" y1="7" x2="26" y2="25" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e8c8ff"/>
      <stop offset="0.45" stop-color="#a66dff"/>
      <stop offset="1" stop-color="#5a2fc4"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4a3470"/>
      <stop offset="1" stop-color="#2a1f45"/>
    </linearGradient>
    <linearGradient id="glint" x1="10" y1="9" x2="22" y2="11" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="9" fill="#14121c"/>
  <rect x="4" y="4" width="24" height="24" rx="7" fill="url(#rim)"/>
  <rect x="6" y="8" width="20" height="16" rx="5" fill="#0d0b12" stroke="#2d2640" stroke-width="1"/>
  <rect x="7" y="9" width="18" height="14" rx="4" fill="url(#face)" filter="url(#soft)"/>
  <rect x="9" y="10" width="14" height="5" rx="2" fill="url(#glint)"/>
</svg>
